name: Flutter CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Flutter
      uses: subosito/flutter-action@v2
      with:
        flutter-version: '3.19.0' # Set to your preferred Flutter version

    - name: Install dependencies
      run: flutter pub get

    - name: Run tests
      run: flutter test

    # Optional: Build APK for Android
    # - name: Build APK
    #   run: flutter build apk --release

    # Optional: Build for Web
    # - name: Build Web
    #   run: flutter build web
